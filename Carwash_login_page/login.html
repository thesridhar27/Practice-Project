<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Car Wash - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

<div class="bg-container">
    <img class="bg-img" src="img/car-wash-bg4.png" alt="">

    <div class="container">
        <h1>LOG IN</h1>
        <form id="login-form">
            <div class="tbox">
                <input id="uname" type="text" placeholder="Username" required>
            </div>

            <div class="tbox">
                <input id="pwd" type="password" placeholder="Password" required>
            </div>

            <input class="btn" type="submit" value="LOGIN">
        </form>

        <a class="b1" href="#">FORGOT PASSWORD?</a>
        <a class="b2" href="#">CREATE AN ACCOUNT</a>
    </div>

    <div id="error-modal" class="modal">
        <div class="modal-header">
            <img src="img/alert_icon.png" alt="Alert">
        </div>
        <p>Incorrect username or password</p>
        <button class="btn" type="button" onclick="dismissModal()">TRY AGAIN</button>
    </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
